spring.application.name=PortfolioService
server.port=8081
#DB configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/portfolioDB
spring.datasource.username=postgres
spring.datasource.password=Atul@2192


spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect



spring.servlet.multipart.max-file-size=10MB
Spring.servlet.multipart.max-request-size=10MB

aws.region=eu-north-1
aws.s3.bucket=switchboard-commonbucket
aws.accessKeyId=${AWS_ACCESS_KEY}
aws.secretKey=${AWS_SECRET_KEY}

# Swagger/OpenAPI configuration
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true
swagger.dev-url=http://localhost:8080