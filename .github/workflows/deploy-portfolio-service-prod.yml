name: Deploy portfolio-service to Production

on:
  push:
    branches:
      - prod

jobs:
  test:
    name: Run Tests & Coverage Check
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout source code
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Set up JDK 17 with Maven cache
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      # 3. Run tests with coverage
      - name: Run Unit Tests & Coverage Check
        run: mvn clean verify
        env:
          MAVEN_OPTS: "-Xmx1024m"

      # 4. Upload JaCoCo coverage report
      - name: Upload Coverage Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-coverage-report
          path: target/site/jacoco/
          retention-days: 30

      # 5. Display coverage summary
      - name: Coverage Summary
        if: success()
        run: |
          echo "### ✅ Test Coverage Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f target/site/jacoco/index.html ]; then
            COVERAGE=$(grep -oP 'Total.*?([0-9]+)%' target/site/jacoco/index.html | tail -1 | grep -oP '[0-9]+%' || echo "N/A")
            echo "- **Overall Coverage**: $COVERAGE" >> $GITHUB_STEP_SUMMARY
            echo "- **Minimum Required**: 70%" >> $GITHUB_STEP_SUMMARY
            echo "- **Status**: ✅ All tests passed" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📊 [View detailed coverage report in artifacts]" >> $GITHUB_STEP_SUMMARY

  deploy:
    name: Build & Deploy portfolio-service
    runs-on: ubuntu-latest
    needs: test  # Only deploy if tests pass

    steps:
      # 1 Checkout source code
      - name: Checkout code
        uses: actions/checkout@v4

      # 2 Enable multi-arch Docker builds
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 3 Login to GitHub Container Registry
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ secrets.GHCR_USERNAME }}
          password: ${{ secrets.GHCR_TOKEN }}

      # 4 Build & push portfolio-service image (linux/amd64)
      - name: Build & Push portfolio-service Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64
          push: true
          tags: ghcr.io/atul-2192/portfolio-service:prod

      # 5 SSH into VPS and redeploy portfolio-service
      - name: Deploy on Contabo VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd /opt/switchboard
            docker compose -f docker-compose.prod.yml pull portfolio-service
            docker compose -f docker-compose.prod.yml up -d portfolio-service
